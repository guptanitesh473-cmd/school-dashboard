# Place this file at: /etc/nginx/sites-available/expndb.online
# Then: sudo ln -s /etc/nginx/sites-available/expndb.online /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name expndb.online www.expndb.online;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name expndb.online www.expndb.online;

    # SSL — managed by Certbot (will be filled in automatically)
    ssl_certificate     /etc/letsencrypt/live/expndb.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/expndb.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy everything to Node.js backend (which also serves the React build)
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Increase upload size limit
    client_max_body_size 10M;
}
